---
- name: Установка UFW
  apt:
    name: ufw
    state: present

- name: Сброс существующих правил UFW
  community.general.ufw:
    state: reset
  when: reset_ufw | default(true)

- name: Настройка правил UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment | default('') }}"
  loop: "{{ ufw_allowed_ports }}"

- name: Включение UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Проверка статуса UFW
  command: ufw status numbered
  register: ufw_status
  changed_when: false

- name: Отображение правил UFW
  debug:
    msg: "{{ ufw_status.stdout_lines }}"
  when: verbose | default(false)