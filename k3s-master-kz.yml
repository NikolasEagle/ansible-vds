---
- name: Настройка зарубежного K3s кластера
  hosts: k3s_master_KZ
  gather_facts: yes
  vars_files:
    - vds-kz/vars/main.yml

  roles:
    - role: apt
      tags: [ apt ]

    - role: root_setup
      tags: [ root_setup ]

    - role: user_setup
      tags: [ user_setup ]

    - role: swap
      tags: [ swap ]

    - role: k3s_install
      tags: [ k3s ]

    - role: kubectl_install
      tags: [ kubectl ]

    - role: helm_install
      tags: [ helm ]

    - role: k9s_install
      tags: [ k9s ]

    - role: flux_install
      tags: [ flux ]

    - role: manifests_apply
      tags: [ manifests ]
      when: apply_manifests | default(true)

    - role: flux_bootstrap
      tags: [ flux_bootstrap ]
      when: bootstrap_flux | default(true)

    - role: ufw_config
      tags: [ ufw ]

  post_tasks:
    - name: Сбор информации о сервисах
      service_facts:
      register: services_info

    - name: Вывод информации о завершении
      debug:
        msg:
          - "========================================="
          - "✅ УСТАНОВКА УСПЕШНО ЗАВЕРШЕНА"
          - "========================================="
          - "   Статус K3s: {{ services_info.ansible_facts.services['k3s.service'].state | default('unknown') }}"
          - "   Пользователь: {{ admin_user | default('vivaldi') }}"
          - "========================================="
          - "   Для управления кластером:"
          - "   ssh {{ admin_user }}@{{ ansible_host }}"
          - "   kubectl get nodes"
          - "   k9s"
          - "========================================="
