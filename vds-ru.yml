---
- name: Настройка российского K3s кластера
  hosts: k3s_master_RU
  gather_facts: yes
  vars_files:
    - vds-ru/vars/main.yml

  roles:
    - role: apt
      tags: [ apt ]

    - role: root_setup
      tags: [ root_setup ]

    - role: user_setup
      tags: [ user_setup ]

    - role: k3s_install
      tags: [ k3s ]

    - role: kubectl_install
      tags: [ kubectl ]

    - role: helm_install
      tags: [ helm ]

    - role: k9s_install
      tags: [ k9s ]

    - role: flux_install
      tags: [ flux ]

    - role: manifests_apply
      tags: [ manifests ]
      when: apply_manifests | default(true)

    - role: flux_bootstrap
      tags: [ flux_bootstrap ]
      when: bootstrap_flux | default(true)

    - role: ufw_config
      tags: [ ufw ]

  post_tasks:
    - name: Вывод информации о завершении
      debug:
        msg:
          - "========================================="
          - "✅ УСТАНОВКА УСПЕШНО ЗАВЕРШЕНА"
          - "========================================="
          - "📊 Статус K3s: {{ ansible_facts.services['k3s'].state }}"
          - "👤 Пользователь: {{ admin_user }}"
          - "🔧 Для управления кластером:"
          - "   ssh {{ admin_user }}@{{ ansible_host }}"
          - "   kubectl get nodes"
          - "   k9s"
          - "========================================="
      run_once: true
